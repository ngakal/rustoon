[application]
name = "RustToon"
default_platform = "web"
asset_dir = "public"
android_main_activity = "MainActivity.kt"

[web.app]
title = "RustToon — Webtoon Reader"
base_path = "."

[web.watcher]
watch_path = ["src", "public"]

[web.resource]
style = ["style.css"]

[web.resource.dev]

[bundle]
identifier = "com.rustoon.app"
publisher = "RustToon"
icon = ["public/icon.png"]

[android]
min_sdk_version = 24
target_sdk_version = 34
compile_sdk_version = 34
build_resources = "public/android-res"

# Permissions for network access
[android.raw]
manifest = """<uses-permission android:name="android.permission.INTERNET" /><uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />"""
application_attrs = """android:usesCleartextTraffic="false" android:networkSecurityConfig="@xml/network_security_config" """

[android.application]
uses_cleartext_traffic = false
