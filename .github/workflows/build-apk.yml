name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android x86_64-linux-android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & Build Tools
        run: |
          sdkmanager --install "ndk;27.0.12077973" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Build Web (verify compilation)
        working-directory: crates/frontend
        run: dx build --platform web --release

      # ─── Build arm64-v8a APK (most modern Android devices) ───
      # Note: Dioxus only supports 64-bit Android targets.
      - name: Build Android APK (arm64-v8a)
        working-directory: crates/frontend
        run: dx build --platform android --release --target aarch64-linux-android
        timeout-minutes: 30

      - name: Patch Android project for WebView compatibility
        run: |
          # ─── Patch build.gradle to enable BuildConfig (AGP 8+ deprecation) ───
          BUILD_GRADLE=$(find target/dx -name "build.gradle.kts" -path "*/app/*" | head -1)
          if [ -n "$BUILD_GRADLE" ]; then
            echo "Patching build.gradle.kts: $BUILD_GRADLE"
            # Add buildFeatures.buildConfig = true inside the android {} block
            sed -i '/android {/a\    buildFeatures {\n        buildConfig = true\n    }' "$BUILD_GRADLE"

            # Fix namespace: AGP generates BuildConfig in the namespace package.
            # Dioxus Logger.kt is in dev.dioxus.main, so namespace must match.
            # Change namespace from com.rustoon.app to dev.dioxus.main
            sed -i 's/namespace = "com.rustoon.app"/namespace = "dev.dioxus.main"/' "$BUILD_GRADLE"
            echo "Patched build.gradle.kts with buildConfig=true and fixed namespace"
          fi

          # ─── Patch AndroidManifest.xml ───
          MANIFEST=$(find target/dx -name "AndroidManifest.xml" -path "*/main/*" | head -1)
          if [ -n "$MANIFEST" ]; then
            echo "Patching AndroidManifest.xml: $MANIFEST"

            # Add INTERNET permission if not present
            if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
              sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
            fi

            # Add ACCESS_NETWORK_STATE permission
            if ! grep -q "android.permission.ACCESS_NETWORK_STATE" "$MANIFEST"; then
              sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
            fi

            # Add networkSecurityConfig to <application> tag
            if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
              sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"
            fi

            echo "Patched manifest:"
            cat "$MANIFEST"
          else
            echo "WARNING: AndroidManifest.xml not found"
          fi

          # ─── Copy network security config ───
          RES_XML=$(dirname "$(find target/dx -name "AndroidManifest.xml" -path "*/main/*" | head -1)")/res/xml
          mkdir -p "$RES_XML"
          if [ -f "crates/frontend/public/android-res/xml/network_security_config.xml" ]; then
            cp crates/frontend/public/android-res/xml/network_security_config.xml "$RES_XML/"
            echo "Copied network_security_config.xml to $RES_XML/"
          fi

          # ─── Patch MainActivity.kt to enable DOM storage and file access ───
          MAIN_ACTIVITY=$(find target/dx -name "MainActivity.kt" -path "*/main/*" | head -1)
          if [ -n "$MAIN_ACTIVITY" ]; then
            echo "Patching MainActivity.kt: $MAIN_ACTIVITY"
            cat > "$MAIN_ACTIVITY" << 'KOTLIN'
          package dev.dioxus.main

          import android.webkit.WebView
          import android.webkit.WebSettings

          class MainActivity : WryActivity() {
              override fun onWebViewCreate(webView: WebView) {
                  super.onWebViewCreate(webView)
                  val settings = webView.settings
                  settings.javaScriptEnabled = true
                  settings.domStorageEnabled = true
                  settings.databaseEnabled = true
                  settings.allowFileAccess = true
                  settings.allowContentAccess = true
                  settings.useWideViewPort = true
                  settings.loadWithOverviewMode = true
                  settings.cacheMode = WebSettings.LOAD_DEFAULT
                  settings.mixedContentMode = WebSettings.MIXED_CONTENT_NEVER_ALLOW
              }
          }
          KOTLIN
            echo "Patched MainActivity.kt with DOM storage and WebView settings"
          fi

      - name: Rebuild APK with patches
        working-directory: target/dx/rustoon-frontend/release/android/app
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug
        timeout-minutes: 10

      - name: Save arm64-v8a APK
        id: arm64_apk
        run: |
          mkdir -p /tmp/apk-output
          APK_PATH=$(find target/dx -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" /tmp/apk-output/rustoon-arm64-v8a.apk
            echo "arm64-v8a APK: $(ls -lh /tmp/apk-output/rustoon-arm64-v8a.apk | awk '{print $5}')"
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No arm64-v8a APK found"
            find . -name "*.apk" -type f 2>/dev/null || true
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # ─── Upload Artifacts ───
      - name: Upload arm64-v8a APK
        if: steps.arm64_apk.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rustoon-arm64-v8a
          path: /tmp/apk-output/rustoon-arm64-v8a.apk
          retention-days: 30

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: rustoon-web
          path: target/dx/rustoon-frontend/release/web/public/
          retention-days: 30
