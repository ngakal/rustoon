name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & Build Tools
        run: |
          sdkmanager --install "ndk;27.0.12077973" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Build Web (verify compilation)
        working-directory: crates/frontend
        run: dx build --platform web --release

      # ─── Build arm64-v8a APK (covers most modern devices) ───
      - name: Build Android APK (arm64-v8a)
        working-directory: crates/frontend
        run: dx build --platform android --release --target aarch64-linux-android
        timeout-minutes: 30

      - name: Save arm64-v8a APK
        run: |
          mkdir -p /tmp/apk-output
          APK_PATH=$(find target/dx -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" /tmp/apk-output/rustoon-arm64-v8a.apk
            echo "arm64-v8a APK: $(ls -lh /tmp/apk-output/rustoon-arm64-v8a.apk | awk '{print $5}')"
          else
            echo "ERROR: No arm64-v8a APK found"
            echo "Searching all paths..."
            find . -name "*.apk" -type f 2>/dev/null || true
            ls -R target/dx/ 2>/dev/null || true
            exit 1
          fi

      # ─── Build armeabi-v7a APK (32-bit / older devices) ───
      - name: Build Android APK (armeabi-v7a)
        working-directory: crates/frontend
        run: dx build --platform android --release --target armv7-linux-androideabi
        timeout-minutes: 30

      - name: Save armeabi-v7a APK
        run: |
          APK_PATH=$(find target/dx -name "*.apk" -type f -newer /tmp/apk-output/rustoon-arm64-v8a.apk | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" /tmp/apk-output/rustoon-armeabi-v7a.apk
            echo "armeabi-v7a APK: $(ls -lh /tmp/apk-output/rustoon-armeabi-v7a.apk | awk '{print $5}')"
          else
            echo "ERROR: No armeabi-v7a APK found"
            find . -name "*.apk" -type f 2>/dev/null || true
            exit 1
          fi

      # ─── Build x86_64 APK (emulators & some tablets) ───
      - name: Build Android APK (x86_64)
        working-directory: crates/frontend
        run: dx build --platform android --release --target x86_64-linux-android
        timeout-minutes: 30

      - name: Save x86_64 APK
        run: |
          APK_PATH=$(find target/dx -name "*.apk" -type f -newer /tmp/apk-output/rustoon-armeabi-v7a.apk | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" /tmp/apk-output/rustoon-x86_64.apk
            echo "x86_64 APK: $(ls -lh /tmp/apk-output/rustoon-x86_64.apk | awk '{print $5}')"
          else
            echo "WARNING: No x86_64 APK found (non-critical)"
            # Create empty file so upload step doesn't fail
            touch /tmp/apk-output/rustoon-x86_64.apk
          fi

      # ─── Upload Artifacts ───
      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: rustoon-arm64-v8a
          path: /tmp/apk-output/rustoon-arm64-v8a.apk
          retention-days: 30

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: rustoon-armeabi-v7a
          path: /tmp/apk-output/rustoon-armeabi-v7a.apk
          retention-days: 30

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: rustoon-x86_64
          path: /tmp/apk-output/rustoon-x86_64.apk
          retention-days: 30

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: rustoon-web
          path: target/dx/rustoon-frontend/release/web/public/
          retention-days: 30
